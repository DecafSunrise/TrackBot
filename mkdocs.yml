site_name: TrackBot Documentation
site_description: ROS2 tracked robot with OAK-D-Lite vision and voice AI
repo_url: https://github.com/DecafSunrise/TrackBot
docs_dir: docs
theme:
  name: material
  palette:
    primary: indigo
    accent: teal
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Hardware Wiring: hardware-wiring.md
  - Power System: power.md
  - Control Loops: control-loops.md
  - Serial Protocol: serial-protocol.md
  - Voice Pipeline: voice-pipeline.md
  - Navigation: navigation.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
